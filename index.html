<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Trajectory Viewer - Final Mobile Optimized</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        #viewport { width: 100vw; height: 100vh; }
        
        /* 상단 탭 (아미노산 선택기) */
        #top-nav {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 8px; border-radius: 30px;
            display: flex; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;
        }
        .aa-btn {
            padding: 8px 16px; border: none; border-radius: 20px;
            background: transparent; color: #555; font-weight: bold; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .aa-btn.active {
            background: #333; color: white;
        }

        /* 하단 컨트롤 바: 2줄 배치로 모바일 최적화 */
        #controls {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); z-index: 10; width: 90vw; max-width: 400px;
        }
        .row { display: flex; flex-direction: row; gap: 8px; justify-content: center; width: 100%; }
        
        .btn { 
            flex: 1; padding: 10px 5px; border: none; border-radius: 8px; 
            background: #007BFF; color: white; font-weight: bold; 
            cursor: pointer; font-size: 13px; white-space: nowrap; text-align: center;
        }
        .btn:active { background: #0056b3; }
        
        .speed-group { display: flex; gap: 6px; width: 100%; justify-content: center; }
        .speed-btn { 
            flex: 1; background: #6c757d; color: white; border: none; 
            padding: 8px 5px; border-radius: 8px; font-weight: bold; 
            font-size: 12px; cursor: pointer; text-align: center;
        }
        .speed-btn.active { background: #28a745; } 

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 16px; font-weight: bold;
            background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 10px;
            display: none; z-index: 20; pointer-events: none;
        }
    </style>
    <script src="https://unpkg.com/ngl@2.3.1/dist/ngl.js"></script>
</head>
<body>
    <div id="top-nav">
        <button class="aa-btn active" data-aa="lys">LYS</button>
        <button class="aa-btn" data-aa="arg">ARG</button>
        <button class="aa-btn" data-aa="ala">ALA</button>
        <button class="aa-btn" data-aa="glu">GLU</button>
    </div>

    <div id="loading">데이터 로드 중...</div>
    <div id="viewport"></div>

    <div id="controls">
        <div class="row">
            <button class="btn" id="prevBtn">⏪ 이전</button>
            <button class="btn" id="playBtn">▶ 재생</button>
            <button class="btn" id="pauseBtn">⏸ 정지</button>
            <button class="btn" id="nextBtn">다음 ⏩</button>
        </div>
        
        <div class="speed-group">
            <button class="speed-btn" id="speed025">0.25x</button>
            <button class="speed-btn" id="speed05">0.5x</button>
            <button class="speed-btn active" id="speed1">1.0x</button>
            <button class="speed-btn" id="speed2">2.0x</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var stage = new NGL.Stage("viewport", { backgroundColor: "#111" });
            window.mdPlayer = null;
            window.mdTrajComp = null;

            function loadSimulation(aaName) {
                var loadingEl = document.getElementById("loading");
                loadingEl.style.display = "block";
                if (window.mdPlayer) { window.mdPlayer.pause(); }
                stage.removeAllComponents();

                var cacheBuster = "?v=" + new Date().getTime();
                var pdbFile = aaName + "_mobile.pdb" + cacheBuster;
                var dcdFile = aaName + "_traj.dcd" + cacheBuster;
                var aaSelection = aaName.toUpperCase();

                stage.loadFile(pdbFile, { ext: "pdb" }).then(function (component) {
                    // LIN: 진한 노란색(기름색) 뼈대
                    component.addRepresentation("licorice", { sele: "LIN", color: "#C5B358", radius: 0.25 });
                    // LYS/ARG/ALA/GLU: 원소별 색상 + 큰 볼
                    component.addRepresentation("ball+stick", { sele: aaSelection, colorScheme: "element", aspectRatio: 3.5, radiusSize: 0.15 });
                    stage.autoView();

                    NGL.autoLoad(dcdFile, { ext: "dcd" }).then(function (frames) {
                        window.mdTrajComp = component.addTrajectory(frames);
                        window.mdPlayer = new NGL.TrajectoryPlayer(window.mdTrajComp.trajectory, { step: 1, timeout: 50 });
                        
                        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                        document.getElementById("speed1").classList.add('active');

                        window.mdPlayer.play();
                        loadingEl.style.display = "none";
                    }).catch(function(err) { loadingEl.style.display = "none"; });
                }).catch(function(err) { loadingEl.style.display = "none"; });
            }

            // 상단 탭 이벤트
            var aaBtns = document.querySelectorAll('.aa-btn');
            aaBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    aaBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    loadSimulation(this.getAttribute('data-aa'));
                });
            });

            // 하단 제어 이벤트
            document.getElementById("playBtn").addEventListener("click", function() { if(window.mdPlayer) window.mdPlayer.play(); });
            document.getElementById("pauseBtn").addEventListener("click", function() { if(window.mdPlayer) window.mdPlayer.pause(); });
            document.getElementById("nextBtn").addEventListener("click", function() { 
                if(!window.mdTrajComp) return;
                window.mdPlayer.pause(); 
                var t = window.mdTrajComp.trajectory;
                window.mdTrajComp.setFrame((t.currentFrame + 1) % t.frameCount); 
            });
            document.getElementById("prevBtn").addEventListener("click", function() { 
                if(!window.mdTrajComp) return;
                window.mdPlayer.pause(); 
                var t = window.mdTrajComp.trajectory;
                var prev = t.currentFrame - 1;
                if (prev < 0) prev = t.frameCount - 1;
                window.mdTrajComp.setFrame(prev); 
            });

            // 속도 제어
            var speedBtns = document.querySelectorAll('.speed-btn');
            function setActiveSpeed(id) { 
                speedBtns.forEach(b => b.classList.remove('active')); 
                document.getElementById(id).classList.add('active'); 
            }

            document.getElementById("speed025").addEventListener("click", function() { if(window.mdPlayer) window.mdPlayer.setParameters({ timeout: 200, step: 1 }); setActiveSpeed("speed025"); });
            document.getElementById("speed05").addEventListener("click", function() { if(window.mdPlayer) window.mdPlayer.setParameters({ timeout: 100, step: 1 }); setActiveSpeed("speed05"); });
            document.getElementById("speed1").addEventListener("click", function() { if(window.mdPlayer) window.mdPlayer.setParameters({ timeout: 50, step: 1 }); setActiveSpeed("speed1"); });
            document.getElementById("speed2").addEventListener("click", function() { if(window.mdPlayer) window.mdPlayer.setParameters({ timeout: 50, step: 2 }); setActiveSpeed("speed2"); });

            loadSimulation("lys");
            window.addEventListener("resize", function () { stage.handleResize(); }, false);
        });
    </script>
</body>
</html>
