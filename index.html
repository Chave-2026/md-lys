<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Trajectory Viewer</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        #viewport { width: 100vw; height: 100vh; }
        #controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); padding: 10px 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10; flex-wrap: wrap; justify-content: center; width: max-content;
        }
        .btn { padding: 8px 10px; border: none; border-radius: 6px; background: #007BFF; color: white; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn:active { background: #0056b3; }
        
        .speed-btn { background: #6c757d; } 
        .speed-btn:active { background: #5a6268; }
        .speed-btn.active { background: #28a745; } 
        
        .divider { width: 2px; height: 20px; background: #ccc; margin: 0 2px; }
    </style>
    <script src="https://unpkg.com/ngl@2.3.1/dist/ngl.js"></script>
</head>
<body>
    <div id="viewport"></div>
    <div id="controls">
        <button class="btn" id="playBtn">▶ 재생</button>
        <button class="btn" id="pauseBtn">⏸ 정지</button>
        
        <div class="divider"></div>
        
        <button class="btn speed-btn" id="speed025">x0.25</button>
        <button class="btn speed-btn" id="speed05">x0.5</button>
        <button class="btn speed-btn active" id="speed1">x1.0</button>
        <button class="btn speed-btn" id="speed2">x2.0</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var stage = new NGL.Stage("viewport", { backgroundColor: "#111" });
            var cacheBuster = "?v=" + new Date().getTime();

            stage.loadFile("lys_mobile.pdb" + cacheBuster, { ext: "pdb" }).then(function (component) {
                
                // [최적화 핵심] 버벅임을 유발하는 multipleBond: true 삭제
                component.addRepresentation("licorice"); 
                component.addRepresentation("cartoon", { color: "sstruc" });
                stage.autoView();

                NGL.autoLoad("lys_traj.dcd" + cacheBuster, { ext: "dcd" }).then(function (frames) {
                    var trajComp = component.addTrajectory(frames);
                    var player = new NGL.TrajectoryPlayer(trajComp.trajectory, { step: 1, timeout: 50 });
                        
                    document.getElementById("playBtn").addEventListener("click", function() { player.play(); });
                    document.getElementById("pauseBtn").addEventListener("click", function() { player.pause(); });
                    
                    var speedBtns = document.querySelectorAll('.speed-btn');
                    function setActiveBtn(activeId) {
                        speedBtns.forEach(function(btn) { btn.classList.remove('active'); });
                        document.getElementById(activeId).classList.add('active');
                    }

                    // 속도 조절 전용 내장 함수(setParameters) 사용 및 최적화
                    document.getElementById("speed025").addEventListener("click", function() {
                        player.setParameters({ timeout: 200, step: 1 }); // 프레임 간격 200ms
                        setActiveBtn("speed025");
                    });

                    document.getElementById("speed05").addEventListener("click", function() {
                        player.setParameters({ timeout: 100, step: 1 }); // 프레임 간격 100ms
                        setActiveBtn("speed05");
                    });
                    
                    document.getElementById("speed1").addEventListener("click", function() {
                        player.setParameters({ timeout: 50, step: 1 }); // 기준 속도
                        setActiveBtn("speed1");
                    });
                    
                    document.getElementById("speed2").addEventListener("click", function() {
                        // 2배속은 연산 과부하를 막기 위해 프레임을 한 장씩 건너뜀 (step: 2)
                        player.setParameters({ timeout: 50, step: 2 }); 
                        setActiveBtn("speed2");
                    });
                        
                    player.play();
                    
                });
            });

            window.addEventListener("resize", function () { stage.handleResize(); }, false);
        });
    </script>
</body>
</html>
