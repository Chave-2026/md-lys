<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lysozyme MD Simulation</title>

  <!-- NGL Viewer -->
  <script src="https://cdn.jsdelivr.net/npm/ngl@2.0.0-dev.37/dist/ngl.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #090d14;
      --surface:   #111827;
      --border:    #1e2d40;
      --accent:    #00d4ff;
      --accent2:   #7c3aed;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #f43f5e;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .header-title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
      white-space: nowrap;
    }
    .header-sub {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .frame-badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 6px;
      padding: 3px 8px;
      color: var(--accent);
      min-width: 80px;
      text-align: center;
    }

    /* ── Viewport ── */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    #viewport canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 10;
      gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }
    #loading-progress {
      font-size: 11px;
      color: var(--accent);
    }

    /* Error overlay */
    #error-msg {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: var(--bg);
      z-index: 11;
      padding: 24px;
      text-align: center;
    }
    #error-msg.visible { display: flex; }
    .error-icon { font-size: 36px; }
    .error-title { font-size: 15px; font-weight: 500; color: var(--danger); }
    .error-detail { font-size: 12px; color: var(--muted); max-width: 320px; line-height: 1.6; }

    /* ── Controls panel ── */
    #controls {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Progress bar */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      position: relative;
      cursor: pointer;
      touch-action: none;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      width: 0%;
      transition: width 0.05s linear;
      pointer-events: none;
    }
    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      left: 0%;
      cursor: grab;
      box-shadow: 0 0 8px rgba(0,212,255,0.6);
      transition: left 0.05s linear;
    }
    .progress-thumb:active { cursor: grabbing; }
    .time-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      min-width: 28px;
      text-align: right;
    }

    /* Buttons row */
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.93); }

    .btn-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text);
      font-size: 17px;
    }
    .btn-icon:hover { background: #2d3f55; }

    .btn-play {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-size: 22px;
      box-shadow: 0 4px 20px rgba(0,212,255,0.25);
    }
    .btn-play:hover { filter: brightness(1.1); }

    /* Speed selector */
    .speed-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .speed-label {
      font-size: 11px;
      color: var(--muted);
      min-width: 36px;
    }
    .speed-chips {
      display: flex;
      gap: 6px;
    }
    .chip {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:hover, .chip.active {
      border-color: var(--accent);
      background: rgba(0,212,255,0.12);
      color: var(--accent);
    }

    /* Representation selector */
    .rep-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rep-label {
      font-size: 11px;
      color: var(--muted);
      min-width: 36px;
    }
    .rep-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div>
      <div class="header-title">LYS · MD Viewer</div>
      <div class="header-sub">lys_mobile.pdb + lys_traj.dcd</div>
    </div>
    <div class="frame-badge" id="frame-counter">FRAME —</div>
  </header>

  <!-- 3D Viewport -->
  <div id="viewport">
    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">구조 파일 로딩 중...</div>
      <div id="loading-progress"></div>
    </div>
    <div id="error-msg">
      <div class="error-icon">⚠️</div>
      <div class="error-title">파일을 불러올 수 없습니다</div>
      <div class="error-detail" id="error-detail">
        lys_mobile.pdb 또는 lys_traj.dcd 파일이 같은 경로에 없습니다.<br>
        GitHub Pages 저장소에 두 파일이 모두 업로드되어 있는지 확인하세요.
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">

    <!-- Progress -->
    <div class="progress-wrap">
      <span class="time-label" id="lbl-start">0</span>
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-thumb" id="progress-thumb"></div>
      </div>
      <span class="time-label" id="lbl-end">—</span>
    </div>

    <!-- Play / Step -->
    <div class="btn-row">
      <button class="btn btn-icon" id="btn-prev" title="이전 프레임">⏮</button>
      <button class="btn btn-play" id="btn-play" title="재생/정지">▶</button>
      <button class="btn btn-icon" id="btn-next" title="다음 프레임">⏭</button>
    </div>

    <!-- Speed -->
    <div class="speed-row">
      <span class="speed-label">속도</span>
      <div class="speed-chips" id="speed-chips">
        <button class="chip" data-fps="5">0.5×</button>
        <button class="chip active" data-fps="15">1×</button>
        <button class="chip" data-fps="30">2×</button>
        <button class="chip" data-fps="60">4×</button>
      </div>
    </div>

    <!-- Representation -->
    <div class="rep-row">
      <span class="rep-label">표현</span>
      <div class="rep-chips" id="rep-chips">
        <button class="chip active" data-rep="cartoon">Cartoon</button>
        <button class="chip" data-rep="ball+stick">Ball+Stick</button>
        <button class="chip" data-rep="surface">Surface</button>
        <button class="chip" data-rep="licorice">Licorice</button>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  // ── State ────────────────────────────────────────────────────────────────
  let stage = null;
  let trajComp = null;
  let player = null;
  let totalFrames = 0;
  let currentFrame = 0;
  let isPlaying = false;
  let fps = 15;
  let rafId = null;
  let lastTime = 0;
  let currentRep = 'cartoon';
  let isDragging = false;

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const viewport    = document.getElementById('viewport');
  const loading     = document.getElementById('loading');
  const loadingProg = document.getElementById('loading-progress');
  const errorMsg    = document.getElementById('error-msg');
  const errorDetail = document.getElementById('error-detail');
  const btnPlay     = document.getElementById('btn-play');
  const btnPrev     = document.getElementById('btn-prev');
  const btnNext     = document.getElementById('btn-next');
  const frameCounter= document.getElementById('frame-counter');
  const progressFill= document.getElementById('progress-fill');
  const progressThumb=document.getElementById('progress-thumb');
  const progressTrack=document.getElementById('progress-track');
  const lblEnd      = document.getElementById('lbl-end');

  // ── Init NGL Stage ───────────────────────────────────────────────────────
  function initStage() {
    stage = new NGL.Stage('viewport', {
      backgroundColor: '#090d14',
      quality: 'medium',
      impostor: true,
      clipNear: 0,
      clipFar: 100,
      fogNear: 50,
      fogFar: 100,
    });

    // Responsive resize
    const ro = new ResizeObserver(() => stage.handleResize());
    ro.observe(viewport);
  }

  // ── Load files ───────────────────────────────────────────────────────────
  async function loadFiles() {
    try {
      loadingProg.textContent = 'PDB 구조 로딩...';

      // NGL은 같은 경로의 파일을 URL로 로드
      const comp = await stage.loadFile('lys_mobile.pdb', {
        defaultRepresentation: false,
        name: 'lysozyme',
      });

      loadingProg.textContent = 'DCD 궤적 로딩...';

      // DCD trajectory 추가
      await comp.addTrajectory('lys_traj.dcd', {
        sele: 'all',
        initialFrame: 0,
        defaultTimeout: 100,
        defaultStep: 1,
        defaultInterpolateType: '',
        centerPbc: true,
        removePbc: true,
        superpose: true,
      });

      trajComp = comp;
      player = comp.trajList[0]; // TrajectoryElement

      // 첫 번째 프레임으로 이동해 총 프레임 수 파악
      await player.trajectory.setFrame(0);
      totalFrames = player.trajectory.frameCount;

      if (!totalFrames || totalFrames < 1) {
        throw new Error('트레젝토리 프레임을 읽을 수 없습니다. DCD 파일이 올바른지 확인하세요.');
      }

      lblEnd.textContent = totalFrames;
      updateFrameUI(0);

      // 표현 추가
      addRepresentation(currentRep);

      stage.autoView();
      loading.style.display = 'none';

    } catch (err) {
      console.error(err);
      showError(err.message || '알 수 없는 오류');
    }
  }

  function addRepresentation(type) {
    if (!trajComp) return;
    trajComp.removeAllRepresentations();

    const repMap = {
      'cartoon': () => trajComp.addRepresentation('cartoon', {
        colorScheme: 'residueindex',
        smoothSheet: true,
      }),
      'ball+stick': () => trajComp.addRepresentation('ball+stick', {
        colorScheme: 'element',
        multipleBond: 'symmetric',
      }),
      'surface': () => trajComp.addRepresentation('surface', {
        colorScheme: 'hydrophobicity',
        opacity: 0.85,
      }),
      'licorice': () => trajComp.addRepresentation('licorice', {
        colorScheme: 'residueindex',
      }),
    };

    const fn = repMap[type] || repMap['cartoon'];
    fn();
  }

  // ── Frame control ─────────────────────────────────────────────────────────
  function setFrame(n) {
    if (!player) return;
    n = Math.max(0, Math.min(n, totalFrames - 1));
    currentFrame = n;
    player.trajectory.setFrame(n);
    updateFrameUI(n);
  }

  function updateFrameUI(n) {
    const pct = totalFrames > 1 ? (n / (totalFrames - 1)) * 100 : 0;
    progressFill.style.width = pct + '%';
    progressThumb.style.left = pct + '%';
    frameCounter.textContent = `${n + 1} / ${totalFrames}`;
  }

  // ── Animation loop ────────────────────────────────────────────────────────
  function animLoop(ts) {
    if (!isPlaying) return;
    const interval = 1000 / fps;
    if (ts - lastTime >= interval) {
      lastTime = ts;
      const next = (currentFrame + 1) % totalFrames;
      setFrame(next);
    }
    rafId = requestAnimationFrame(animLoop);
  }

  function play() {
    isPlaying = true;
    btnPlay.textContent = '⏸';
    lastTime = performance.now();
    rafId = requestAnimationFrame(animLoop);
  }

  function pause() {
    isPlaying = false;
    btnPlay.textContent = '▶';
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function togglePlay() {
    isPlaying ? pause() : play();
  }

  // ── Progress bar drag ─────────────────────────────────────────────────────
  function trackToFrame(clientX) {
    const rect = progressTrack.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(pct * (totalFrames - 1));
  }

  progressTrack.addEventListener('pointerdown', (e) => {
    if (!totalFrames) return;
    isDragging = true;
    progressTrack.setPointerCapture(e.pointerId);
    const wasPlaying = isPlaying;
    if (wasPlaying) pause();
    progressTrack._wasPlaying = wasPlaying;
    setFrame(trackToFrame(e.clientX));
  });

  progressTrack.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    setFrame(trackToFrame(e.clientX));
  });

  progressTrack.addEventListener('pointerup', () => {
    if (!isDragging) return;
    isDragging = false;
    if (progressTrack._wasPlaying) play();
  });

  // ── Button events ─────────────────────────────────────────────────────────
  btnPlay.addEventListener('click', togglePlay);
  btnPrev.addEventListener('click', () => { pause(); setFrame(currentFrame - 1); });
  btnNext.addEventListener('click', () => { pause(); setFrame(currentFrame + 1); });

  // Speed chips
  document.getElementById('speed-chips').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#speed-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    fps = parseInt(chip.dataset.fps, 10);
  });

  // Representation chips
  document.getElementById('rep-chips').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#rep-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentRep = chip.dataset.rep;
    addRepresentation(currentRep);
  });

  // ── Error display ─────────────────────────────────────────────────────────
  function showError(msg) {
    loading.style.display = 'none';
    errorDetail.innerHTML = `
      <strong>${msg}</strong><br><br>
      아래 사항을 확인하세요:<br>
      • lys_mobile.pdb 와 lys_traj.dcd 가 index.html 과 <b>같은 폴더</b>에 있어야 합니다.<br>
      • GitHub Pages 배포 후 파일이 실제로 접근 가능한지 확인하세요.<br>
      • 브라우저 콘솔(F12)에서 404 오류를 확인하세요.
    `;
    errorMsg.classList.add('visible');
  }

  // ── Start ────────────────────────────────────────────────────────────────
  initStage();
  loadFiles();

})();
</script>
</body>
</html>
