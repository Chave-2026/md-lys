<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Trajectory Viewer - Final Refined UI</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        #viewport { width: 100vw; height: 100vh; }
        
        /* 컨트롤 바: 한 줄 통합, 스타일 개선 */
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 12px 25px; border-radius: 60px;
            display: flex; flex-direction: row; align-items: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7); z-index: 10;
        }
        
        /* [핵심 수정] 모든 아이콘 버튼 크기 균일화 */
        .icon-btn {
            background: none; border: none; cursor: pointer; padding: 0;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s; color: #333;
            width: 48px; height: 48px; /* 모든 아이콘 버튼 크기 고정 */
        }
        .icon-btn:active { transform: scale(0.9); }
        
        /* [핵심 수정] 재생/일시정지 크기를 이전/다음과 동일하게 설정 */
        .control-icon { font-size: 32px; } /* 아이콘 자체 크기 */
        
        /* 배속 버튼 그룹 */
        .speed-group { display: flex; gap: 6px; margin-left: 10px; }
        
        /* [핵심 수정] 배속 버튼 크기 확대 */
        .speed-btn {
            padding: 8px 16px; border: 1px solid #ddd; border-radius: 25px;
            background: white; color: #666; font-size: 14px; font-weight: bold; cursor: pointer;
            min-width: 60px; /* 최소 너비 확보 */
        }
        .speed-btn.active {
            background: #007BFF; color: white; border-color: #007BFF;
        }
        
        .vertical-divider { width: 1px; height: 35px; background: #ddd; margin: 0 5px; }
    </style>
    <script src="https://unpkg.com/ngl@2.3.1/dist/ngl.js"></script>
</head>
<body>
    <div id="viewport"></div>
    <div id="controls">
        <button class="icon-btn control-icon" id="prevBtn" title="이전 프레임">⏪</button>
        <button class="icon-btn control-icon" id="playBtn" title="재생">▶</button>
        <button class="icon-btn control-icon" id="pauseBtn" title="일시정지">⏸</button>
        <button class="icon-btn control-icon" id="nextBtn" title="다음 프레임">ㅣ▶</button>
        
        <div class="vertical-divider"></div>
        
        <div class="speed-group">
            <button class="speed-btn" id="speed025">0.25x</button>
            <button class="speed-btn" id="speed05">0.5x</button>
            <button class="speed-btn active" id="speed1">1.0x</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var stage = new NGL.Stage("viewport", { backgroundColor: "#111" });
            var cacheBuster = "?v=" + new Date().getTime();

            stage.loadFile("lys_mobile.pdb" + cacheBuster, { ext: "pdb" }).then(function (component) {
                
                // LIN: 진한 노란색(기름색) 골격 강조 (고정)
                component.addRepresentation("licorice", { 
                    sele: "LIN", 
                    color: "#C5B358", 
                    radius: 0.25      
                });

                // LYS: 원소별 색상 + 큰 볼 스타일 (고정)
                component.addRepresentation("ball+stick", { 
                    sele: "LYS", 
                    colorScheme: "element",
                    aspectRatio: 3.5,
                    radiusSize: 0.15
                });

                stage.autoView();

                NGL.autoLoad("lys_traj.dcd" + cacheBuster, { ext: "dcd" }).then(function (frames) {
                    var trajComp = component.addTrajectory(frames);
                    var player = new NGL.TrajectoryPlayer(trajComp.trajectory, { step: 1, timeout: 50 });

                    // 버튼 이벤트 연결
                    document.getElementById("playBtn").addEventListener("click", function() { player.play(); });
                    document.getElementById("pauseBtn").addEventListener("click", function() { player.pause(); });
                    
                    // [핵심 수정] 단일 프레임/스텝 이동 기능 (사용자가 원한 ㅣ있는 그거)
                    document.getElementById("nextBtn").addEventListener("click", function() { 
                        player.pause(); 
                        trajComp.setFrame((trajComp.trajectory.currentFrame + 1) % trajComp.trajectory.frameCount); 
                    });
                    document.getElementById("prevBtn").addEventListener("click", function() { 
                        player.pause(); 
                        var prev = trajComp.trajectory.currentFrame - 1;
                        if (prev < 0) prev = trajComp.trajectory.frameCount - 1;
                        trajComp.setFrame(prev); 
                    });

                    // 속도 제어
                    var speedBtns = document.querySelectorAll('.speed-btn');
                    function setActiveBtn(id) { 
                        speedBtns.forEach(b => b.classList.remove('active')); 
                        document.getElementById(id).classList.add('active'); 
                    }

                    document.getElementById("speed025").addEventListener("click", function() { 
                        player.setParameters({ timeout: 200, step: 1 }); setActiveBtn("speed025"); 
                    });
                    document.getElementById("speed05").addEventListener("click", function() { 
                        player.setParameters({ timeout: 100, step: 1 }); setActiveBtn("speed05"); 
                    });
                    document.getElementById("speed1").addEventListener("click", function() { 
                        player.setParameters({ timeout: 50, step: 1 }); setActiveBtn("speed1"); 
                    });

                    player.play();
                });
            });

            window.addEventListener("resize", function () { stage.handleResize(); }, false);
        });
    </script>
</body>
</html>
