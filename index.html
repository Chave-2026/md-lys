<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Trajectory Viewer - Final Reverted</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        #viewport { width: 100vw; height: 100vh; }
        
        /* 컨트롤 바: 가로 1줄 유지, 깔끔한 캡슐 박스 형태 */
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 12px 20px; border-radius: 40px;
            display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6); z-index: 10; max-width: 95vw; width: max-content;
        }
        
        /* 텍스트 버튼 스타일 (안정적인 원래 박스 형태로 원복) */
        .btn { 
            padding: 8px 12px; border: none; border-radius: 6px; 
            background: #007BFF; color: white; font-weight: bold; 
            cursor: pointer; font-size: 13px; white-space: nowrap; 
        }
        .btn:active { background: #0056b3; }
        
        /* 배속 버튼 그룹 및 스타일 */
        .speed-group { display: flex; gap: 6px; }
        .speed-btn { 
            background: #6c757d; color: white; border: none; 
            padding: 8px 12px; border-radius: 6px; font-weight: bold; 
            font-size: 13px; cursor: pointer; white-space: nowrap;
        }
        .speed-btn:active { background: #5a6268; }
        .speed-btn.active { background: #28a745; } 
        
        /* 버튼 사이 세로 구분선 */
        .divider { width: 2px; height: 24px; background: #ccc; margin: 0 4px; }
    </style>
    <script src="https://unpkg.com/ngl@2.3.1/dist/ngl.js"></script>
</head>
<body>
    <div id="viewport"></div>
    <div id="controls">
        <button class="btn" id="prevBtn">⏪ 이전</button>
        <button class="btn" id="playBtn">▶ 재생</button>
        <button class="btn" id="pauseBtn">⏸ 정지</button>
        <button class="btn" id="nextBtn">다음 ⏩</button>
        
        <div class="divider"></div>
        
        <div class="speed-group">
            <button class="speed-btn" id="speed025">x0.25</button>
            <button class="speed-btn" id="speed05">x0.5</button>
            <button class="speed-btn active" id="speed1">x1.0</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var stage = new NGL.Stage("viewport", { backgroundColor: "#111" });
            var cacheBuster = "?v=" + new Date().getTime();

            stage.loadFile("lys_mobile.pdb" + cacheBuster, { ext: "pdb" }).then(function (component) {
                
                // LIN: 진한 노란색(기름색) 뼈대
                component.addRepresentation("licorice", { 
                    sele: "LIN", 
                    color: "#C5B358", 
                    radius: 0.25      
                });

                // LYS: 원소별 색상 + 큰 볼
                component.addRepresentation("ball+stick", { 
                    sele: "LYS", 
                    colorScheme: "element",
                    aspectRatio: 3.5,
                    radiusSize: 0.15
                });

                stage.autoView();

                NGL.autoLoad("lys_traj.dcd" + cacheBuster, { ext: "dcd" }).then(function (frames) {
                    var trajComp = component.addTrajectory(frames);
                    var player = new NGL.TrajectoryPlayer(trajComp.trajectory, { step: 1, timeout: 50 });

                    // 버튼 이벤트
                    document.getElementById("playBtn").addEventListener("click", function() { player.play(); });
                    document.getElementById("pauseBtn").addEventListener("click", function() { player.pause(); });
                    document.getElementById("nextBtn").addEventListener("click", function() { 
                        player.pause(); 
                        trajComp.setFrame((trajComp.trajectory.currentFrame + 1) % trajComp.trajectory.frameCount); 
                    });
                    document.getElementById("prevBtn").addEventListener("click", function() { 
                        player.pause(); 
                        var prev = trajComp.trajectory.currentFrame - 1;
                        if (prev < 0) prev = trajComp.trajectory.frameCount - 1;
                        trajComp.setFrame(prev); 
                    });

                    // 속도 제어
                    var speedBtns = document.querySelectorAll('.speed-btn');
                    function setActiveBtn(id) { 
                        speedBtns.forEach(b => b.classList.remove('active')); 
                        document.getElementById(id).classList.add('active'); 
                    }

                    document.getElementById("speed025").addEventListener("click", function() { 
                        player.setParameters({ timeout: 200, step: 1 }); setActiveBtn("speed025"); 
                    });
                    document.getElementById("speed05").addEventListener("click", function() { 
                        player.setParameters({ timeout: 100, step: 1 }); setActiveBtn("speed05"); 
                    });
                    document.getElementById("speed1").addEventListener("click", function() { 
                        player.setParameters({ timeout: 50, step: 1 }); setActiveBtn("speed1"); 
                    });

                    player.play();
                });
            });

            window.addEventListener("resize", function () { stage.handleResize(); }, false);
        });
    </script>
</body>
</html>
